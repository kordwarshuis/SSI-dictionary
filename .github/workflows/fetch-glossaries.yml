name: Fetch External Glossaries

on:
  # Run once a day at 02:00 UTC
  schedule:
    - cron: '0 2 * * *'

  # Allow manual runs from the Actions tab on GitHub
  workflow_dispatch:

jobs:
  fetch-glossaries:
    name: Fetch & Combine Glossaries
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the generated dictionary.json

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Install npm dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Fetch glossaries & combine into dictionary.json ────────────────
      #    main.sh owns all fetcher invocations and directory setup so there
      #    is a single source of truth – edit main.sh, not this workflow.
      - name: Fetch glossaries
        run: bash fetchExternalContent/fetchExternalGlossaries/main.sh

      # ── 5. Commit the generated file back to the repo ─────────────────────
      - name: Commit and push dictionary.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/glossaries/ public/data/dictionary.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): update glossaries [skip ci]"
            git push
          fi
